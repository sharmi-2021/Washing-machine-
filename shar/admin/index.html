<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login – Machine Service</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="admin-login-page">
  <div class="login-card">
    <div class="login-logo">🫧</div>
    <h2>Admin Panel</h2>
    <p>Machine Services</p>
    <form id="adminLoginForm">
      <div class="admin-form-group">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="admin-form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="login-btn">🔐 Sign In to Dashboard</button>
      <p class="login-error" id="loginError"></p>
    </form>
    <p style="margin-top:24px;color:rgba(255,255,255,0.3);font-size:0.78rem;text-align:center;">Default credentials: admin / machine2024</p>
  </div>
</div>
<script src="../js/admin.js"></script>
</body>
</html>
